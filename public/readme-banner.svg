<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 440" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F7F1E8"/>
      <stop offset="100%" stop-color="#EFE6D8"/>
    </linearGradient>
    <radialGradient id="blob1" cx="80%" cy="25%" r="35%">
      <stop offset="0%" stop-color="#E8439C" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#E8439C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob2" cx="20%" cy="80%" r="40%">
      <stop offset="0%" stop-color="#9F68E6" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#9F68E6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob3" cx="65%" cy="85%" r="30%">
      <stop offset="0%" stop-color="#F7A64E" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#F7A64E" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E8439C"/>
      <stop offset="100%" stop-color="#9F68E6"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="440" fill="url(#bg)"/>
  <rect width="1280" height="440" fill="url(#blob1)"/>
  <rect width="1280" height="440" fill="url(#blob2)"/>
  <rect width="1280" height="440" fill="url(#blob3)"/>

  <!-- brand dot -->
  <circle cx="90" cy="94" r="10" fill="url(#accent)"/>
  <text x="118" y="104" font-family="Manrope, Inter, system-ui, sans-serif" font-size="28" font-weight="700" fill="#17192A" letter-spacing="-0.5">Roomy</text>

  <!-- hero wordmark -->
  <text x="90" y="270" font-family="Manrope, Inter, system-ui, sans-serif" font-size="180" font-weight="800" fill="#17192A" letter-spacing="-7">Roomy</text>

  <!-- tagline -->
  <text x="90" y="328" font-family="Manrope, Inter, system-ui, sans-serif" font-size="28" font-weight="500" fill="#4B4E60">Соседи, с которыми <tspan fill="url(#accent)" font-weight="700">уживёшься</tspan>.</text>

  <!-- chip -->
  <rect x="90" y="358" width="280" height="36" rx="18" fill="#FFFFFF" fill-opacity="0.7" stroke="#E8E0D0"/>
  <circle cx="108" cy="376" r="3" fill="#E8439C"/>
  <text x="120" y="381" font-family="Manrope, Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#4B4E60" letter-spacing="2">СОВМЕСТИМОСТЬ ЗА 30 СЕКУНД</text>

  <!-- floating match card -->
  <g transform="translate(900, 120) rotate(3)">
    <rect width="300" height="210" rx="22" fill="#FFFFFF" stroke="#E8E0D0"/>
    <circle cx="42" cy="42" r="22" fill="url(#accent)"/>
    <text x="80" y="40" font-family="Manrope, Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#17192A">Марина, 23</text>
    <text x="80" y="58" font-family="Manrope, Inter, system-ui, sans-serif" font-size="12" fill="#8A8A98">Архитектор · Хамовники</text>
    <circle cx="258" cy="42" r="22" fill="#E8439C"/>
    <text x="258" y="48" font-family="Manrope, Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#FFF" text-anchor="middle">92</text>

    <rect x="22" y="90" width="256" height="6" rx="3" fill="#F1E9D8"/>
    <rect x="22" y="90" width="235" height="6" rx="3" fill="url(#accent)"/>

    <rect x="22" y="120" width="78" height="24" rx="12" fill="#FFE5EF"/>
    <text x="61" y="136" font-family="Manrope, Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#D12E80" text-anchor="middle">✓ Чистота</text>
    <rect x="106" y="120" width="78" height="24" rx="12" fill="#FFE5EF"/>
    <text x="145" y="136" font-family="Manrope, Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#D12E80" text-anchor="middle">✓ Ритм</text>
    <rect x="190" y="120" width="78" height="24" rx="12" fill="#FFF3E0"/>
    <text x="229" y="136" font-family="Manrope, Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#C68100" text-anchor="middle">~ Гости</text>

    <text x="22" y="175" font-family="Manrope, Inter, system-ui, sans-serif" font-size="11" fill="#8A8A98">12 параметров · 2 несовпадения</text>
  </g>
</svg>
